{% extends "base.html" %}

{% block title %}分类 | {{ config.title }}{% endblock %}

{% block content %}
<nav class="post-nav-bar">
    <a class="post-nav-item" href="{{ get_url(path='/') | safe }}">近期发布</a>
    <a class="post-nav-item active" href="{{ get_url(path='/categories/') | safe }}">分类</a>
    <a class="post-nav-item" href="{{ get_url(path='/tags/') | safe }}">标签</a>
    <a class="post-nav-item" href="{{ get_url(path='/archive/') | safe }}">归档</a>
    <a class="post-nav-item" href="{{ get_url(path='/rss/') | safe }}">RSS 订阅</a>
</nav>
{% set tax = get_taxonomy(kind="categories") %}
<div class="tax-page-cats">
    {% for term in tax.items %}
    <a class="tax-cat-item" href="{{ term.permalink }}">
        <span class="tax-cat-icon">📁</span>
        <span class="tax-cat-name">{{ term.name }}</span>
        <span class="tax-cat-count">({{ term.pages | length }})</span>
    </a>
    {% endfor %}
</div>
{% endblock content %}
